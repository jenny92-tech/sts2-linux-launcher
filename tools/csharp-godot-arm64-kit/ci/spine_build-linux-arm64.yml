name: 🛠 Build spine-godot extension linux arm64

# Build for OLD-glibc handhelds (e.g. TrimUI Smart Pro = glibc 2.33).
# Native arm64 runner; ubuntu 20.04 container so libc/libm symbols stay ≤ 2.31.

on:
  workflow_dispatch:

env:
  GODOT_TAG: "4.5.1-stable"
  DEV_BUILD: "false"

jobs:
  build-linux-arm64:
    name: spine-godot GDExtension linux arm64 (Godot 4.5, glibc≤2.31)
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:20.04
    steps:
      - name: System prereqs inside container
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            ca-certificates curl git python3 python3-pip \
            build-essential pkg-config \
            libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu-dev \
            libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev
          ldd --version | head -1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: scons via pip
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install scons==4.7.0
          scons --version

      - name: Build GDExtension (linux arm64, glibc≤2.31)
        run: |
          cd spine-godot/build
          ./setup-extension.sh "$GODOT_TAG" "$DEV_BUILD"
          ./build-extension.sh linux arm64

      - name: Verify GLIBC requirement on built .so
        run: |
          for so in spine-godot/example-v4-extension/bin/linux/*.so; do
            echo "--- $so ---"
            objdump -T "$so" | awk '/GLIBC_/{print $5}' | sort -u
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: spine-godot-linux-arm64-glibc2.31
          path: spine-godot/example-v4-extension/bin/linux/*.so
          if-no-files-found: error
